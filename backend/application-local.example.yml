# 敏感配置文件（本地开发用）
# 复制此文件为 application-local.yml 并填入真实值
# 此文件不会被提交到 Git

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/turtle_soup?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: 你的数据库用户名
    password: 你的数据库密码
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: 换成一段随机长字符串
  expiration: 86400000

llm:
  provider: deepseek
  api-key: 你的DeepSeek API Key
  model: deepseek-chat
  base-url: https://api.deepseek.com/v1
