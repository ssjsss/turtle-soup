<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海龟汤 - 投稿</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee; min-height: 100vh;
            padding-bottom: 30px;
        }
        .header {
            display: flex; align-items: center; padding: 16px 20px;
            background: #16213e;
        }
        .header h2 { font-size: 20px; margin-left: 12px; }
        .back-btn {
            background: none; border: none; color: #e94560; font-size: 18px; cursor: pointer;
        }
        .form { padding: 20px; }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block; margin-bottom: 6px; font-size: 14px; color: #a8b2d1;
        }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2a3a5c;
            background: #0f3460; color: #eee; font-size: 15px; outline: none;
            resize: vertical;
        }
        .form-group textarea { min-height: 120px; font-family: inherit; line-height: 1.6; }
        .form-group input:focus, .form-group textarea:focus { border-color: #e94560; }
        .hint { font-size: 12px; color: #8892b0; margin-top: 4px; }
        .submit-btn {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #e94560, #f5a623);
            color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .submit-btn:active { opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result {
            display: none; padding: 20px; margin: 0 20px 20px; border-radius: 12px; text-align: center;
        }
        .result.pass { background: #1a2a1a; border: 1px solid #4caf50; }
        .result.fail { background: #2a1a1a; border: 1px solid #e94560; }
        .result h3 { margin-bottom: 8px; font-size: 18px; }
        .result .msg { font-size: 14px; color: #ccc; line-height: 1.6; margin-bottom: 14px; }
        .result .meta { font-size: 13px; color: #8892b0; margin-bottom: 10px; }
        .result button {
            padding: 10px 24px; border-radius: 8px; border: none;
            background: #e94560; color: #fff; font-size: 14px; cursor: pointer;
        }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); justify-content: center; align-items: center;
            flex-direction: column; z-index: 100;
        }
        .loading-overlay.show { display: flex; }
        .spinner {
            width: 48px; height: 48px; border: 3px solid #2a3a5c;
            border-top-color: #e94560; border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 16px; color: #ccc; font-size: 14px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='/index.html'">←</button>
        <h2>投稿海龟汤</h2>
    </div>
    <div class="form" id="uploadForm">
        <div class="form-group">
            <label>谜面（故事描述）</label>
            <textarea id="content" placeholder="写一个离奇的故事片段，不要透露答案..."></textarea>
            <div class="hint">玩家看到的故事谜面，要有悬念感</div>
        </div>
        <div class="form-group">
            <label>真相（答案）</label>
            <textarea id="answer" placeholder="写出完整的故事真相，用于AI判断玩家的提问..."></textarea>
            <div class="hint">AI 根据这个答案来判断玩家的提问，写越详细越好</div>
        </div>
        <div class="form-group">
            <label>标题</label>
            <input type="text" id="title" placeholder="给你海龟汤起个名字">
        </div>
        <div class="form-group">
            <label>作者署名</label>
            <input type="text" id="author" placeholder="你的名字或笔名">
        </div>
        <button class="submit-btn" id="submitBtn" onclick="submitPuzzle()">提交审核</button>
    </div>
    <div class="result" id="result">
        <h3 id="resultTitle"></h3>
        <div class="meta" id="resultMeta"></div>
        <div class="msg" id="resultMsg"></div>
        <button onclick="resetForm()">再投一篇</button>
    </div>
    <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <div class="loading-text">AI 审核中，请稍候...</div>
    </div>

    <script src="api.js"></script>
    <script>
        if (!api.token) { location.href = '/login.html'; }

        async function submitPuzzle() {
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const answer = document.getElementById('answer').value.trim();
            const author = document.getElementById('author').value.trim();

            if (!title || !content || !answer || !author) {
                alert('请填写完整信息');
                return;
            }

            document.getElementById('loading').classList.add('show');
            document.getElementById('submitBtn').disabled = true;

            try {
                const data = await api.post('/api/puzzle/upload', { title, content, answer, author });
                showResult(data);
            } catch (e) {
                alert('提交失败：' + e.message);
            }

            document.getElementById('loading').classList.remove('show');
            document.getElementById('submitBtn').disabled = false;
        }

        function showResult(data) {
            document.getElementById('uploadForm').style.display = 'none';
            const result = document.getElementById('result');
            result.style.display = 'block';

            if (data.passed) {
                result.className = 'result pass';
                document.getElementById('resultTitle').textContent = '✅ 审核通过！';
                document.getElementById('resultMeta').textContent =
                    '难度：' + data.difficulty + ' | 分类：' + data.category;
                document.getElementById('resultMsg').textContent = data.message;
            } else {
                result.className = 'result fail';
                document.getElementById('resultTitle').textContent = '❌ 审核未通过';
                document.getElementById('resultMeta').textContent = '';
                document.getElementById('resultMsg').textContent = data.message;
            }
        }

        function resetForm() {
            document.getElementById('uploadForm').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('answer').value = '';
            document.getElementById('author').value = '';
        }
    </script>
</body>
</html>
