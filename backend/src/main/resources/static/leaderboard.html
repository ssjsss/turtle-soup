<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="manifest" href="/manifest.json">
        <title>海龟汤 - 排行榜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee; min-height: 100vh;
            padding-bottom: 60px;
        }
        .header {
            display: flex; align-items: center; padding: 16px 20px;
            background: #16213e;
        }
        .header h2 { font-size: 20px; margin-left: 12px; }
        .back-btn {
            background: none; border: none; color: #e94560; font-size: 18px; cursor: pointer;
        }
        .info {
            text-align: center; padding: 12px; color: #8892b0; font-size: 13px;
        }
        .list { padding: 0 16px; }
        .rank-item {
            display: flex; align-items: center; padding: 14px 16px;
            background: #16213e; border-radius: 12px; margin-bottom: 8px;
            gap: 14px;
        }
        .rank-num {
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; font-weight: 700;
            background: #0f3460; color: #8892b0;
        }
        .rank-item:nth-child(1) .rank-num { background: #ffd700; color: #000; }
        .rank-item:nth-child(2) .rank-num { background: #c0c0c0; color: #000; }
        .rank-item:nth-child(3) .rank-num { background: #cd7f32; color: #fff; }
        .rank-name { flex: 1; font-size: 16px; }
        .rank-score { font-size: 18px; font-weight: 700; color: #f5a623; }
        .rank-score .unit { font-size: 12px; color: #8892b0; margin-left: 2px; }
        .empty { text-align: center; padding: 60px 20px; color: #8892b0; display: none; }
        .empty .icon { font-size: 64px; margin-bottom: 16px; }
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: #16213e; border-top: 1px solid #2a3a5c;
        }
        .nav-item {
            flex: 1; text-align: center; padding: 12px 0;
            color: #8892b0; cursor: pointer; font-size: 12px; text-decoration: none;
        }
        .nav-item.active { color: #e94560; }
        .nav-item .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='/index.html'">←</button>
        <h2>排行榜</h2>
    </div>
    <div class="info">简单题 2 分 | 中等题 3 分 | 困难题 5 分</div>
    <div class="list" id="rankList"></div>
    <div class="empty" id="empty" style="display:none">
        <div class="icon">🏆</div>
        <p>还没有人上榜</p>
        <button style="margin-top:16px;padding:12px 24px;border-radius:8px;border:none;background:#e94560;color:#fff;cursor:pointer;" onclick="location.href='/index.html'">去玩一局</button>
    </div>
    <div class="nav-bar">
        <a class="nav-item" href="/index.html"><span class="nav-icon">🏠</span>首页</a>
        <a class="nav-item" href="/history.html"><span class="nav-icon">📋</span>历史</a>
        <a class="nav-item active" href="/leaderboard.html"><span class="nav-icon">🏆</span>排行</a>
        <a class="nav-item" href="/profile.html"><span class="nav-icon">👤</span>我的</a>
    </div>

    <script src="api.js"></script>
    <script>
        (async function init() {
            if (!api.token) { location.href = '/login.html'; return; }
            try {
                const data = await api.get('/api/leaderboard');
                if (!data || data.length === 0) {
                    document.getElementById('empty').style.display = 'block';
                    return;
                }
                const list = document.getElementById('rankList');
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'rank-item';
                    div.innerHTML = `
                        <div class="rank-num">${item.rank}</div>
                        <div class="rank-name">${item.nickname}</div>
                        <div class="rank-score">${item.score}<span class="unit">分</span></div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                document.getElementById('empty').style.display = 'block';
            }
        })();
    </script>
</body>
</html>
