<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海龟汤 - 推理中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee;
            display: flex; flex-direction: column; height: 100vh;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: #16213e;
        }
        .header h2 { font-size: 17px; color: #f5a623; }
        .header .back-btn {
            background: none; border: none; color: #e94560; font-size: 15px; cursor: pointer;
        }
        .chat-area {
            flex: 1; overflow-y: auto; padding: 12px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.6; animation: fadeIn 0.3s; word-break: break-word; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: #16213e; border-bottom-left-radius: 4px; }
        .msg.ai.yes { border-left: 3px solid #4caf50; }
        .msg.ai.no { border-left: 3px solid #e94560; }
        .msg.ai.irrelevant { border-left: 3px solid #8892b0; }
        .msg.ai.solved { border-left: 3px solid #f5a623; background: #1a2a1a; }
        .msg.ai.puzzle { border-left: 3px solid #f5a623; }
        .msg.ai.system { align-self: center; text-align: center; color: #8892b0; background: none; font-size: 13px; }
        .typing { color: #8892b0; font-size: 14px; padding: 8px 16px; display: none; }
        .input-area {
            display: flex; padding: 10px 16px; gap: 8px;
            background: #16213e; border-top: 1px solid #2a3a5c;
        }
        .input-area input {
            flex: 1; padding: 12px 16px; border-radius: 20px; border: 1px solid #2a3a5c;
            background: #0f3460; color: #eee; font-size: 15px; outline: none;
        }
        .input-area input:focus { border-color: #e94560; }
        .input-area button {
            padding: 12px 20px; border-radius: 20px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer;
            background: #e94560; color: #fff; white-space: nowrap;
        }
        .input-area button:active { opacity: 0.85; }
        .game-over {
            display: none; text-align: center; padding: 20px;
            background: linear-gradient(135deg, #16213e, #0f3460); margin: 12px 16px; border-radius: 12px;
        }
        .game-over h3 { margin-bottom: 10px; font-size: 18px; }
        .game-over .answer { color: #f5a623; font-size: 14px; line-height: 1.7; margin-bottom: 14px; }
        .game-over button {
            padding: 12px 24px; border-radius: 10px; border: none;
            background: #e94560; color: #fff; font-size: 15px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='/index.html'">← 返回</button>
        <h2 id="headerTitle">推理中...</h2>
        <button class="back-btn" onclick="abandonGame()" id="abandonBtn">放弃</button>
    </div>
    <div class="chat-area" id="chatArea">
    </div>
    <div class="typing" id="typing">AI 思考中...</div>
    <div id="inputArea" class="input-area">
        <input type="text" id="questionInput" placeholder="输入提问或说出你的推理..."
            onkeydown="if(event.key==='Enter')ask()">
        <button onclick="ask()">发送</button>
    </div>
    <div id="gameOver" class="game-over">
        <h3 id="gameOverTitle"></h3>
        <div class="answer" id="gameOverAnswer"></div>
        <button onclick="location.href='/index.html'">再来一题</button>
    </div>

    <script src="api.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const sessionId = params.get('sessionId');
        let gameActive = true;

        (async function init() {
            if (!api.token) { location.href = '/login.html'; return; }
            if (!sessionId) { location.href = '/index.html'; return; }
            try {
                // 显示谜面作为 AI 的第一条消息
                const history = await api.get('/api/game/history');
                const session = history.find(s => s.sessionId == sessionId);
                if (session) {
                    document.getElementById('headerTitle').textContent = session.title || '推理中...';
                }
                // 通过 start 接口的返回获取谜面，存到了 local（从 index 页传过来）
                // 这里用 puzzle/random?id 不合适，改用简单的办法：从 localStorage 读
                const puzzleData = JSON.parse(localStorage.getItem('currentPuzzle') || '{}');
                if (puzzleData.content) {
                    addMessage('📖 ' + puzzleData.content, 'ai puzzle');
                    addMessage('你可以向我提问，也可以直接说出你的推理', 'ai system');
                }
            } catch (e) {
                console.error(e);
            }
        })();

        async function ask() {
            if (!gameActive) return;
            const input = document.getElementById('questionInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            document.getElementById('typing').style.display = 'block';

            try {
                const data = await api.post('/api/game/' + sessionId + '/ask', { question: text });
                let replyClass = '';
                if (data.reply === '是') replyClass = 'yes';
                else if (data.reply === '否') replyClass = 'no';
                else if (data.reply === '猜错了再想想') replyClass = 'no';
                else if (data.solved) replyClass = 'solved';
                else replyClass = 'irrelevant';

                addMessage(data.reply, 'ai ' + replyClass);

                if (data.solved) {
                    endGame(data.answer);
                }
            } catch (e) {
                addMessage('出错啦：' + e.message, 'ai system');
            }
            document.getElementById('typing').style.display = 'none';
        }

        async function abandonGame() {
            if (!gameActive) return;
            if (!confirm('确定放弃吗？放弃后将显示答案。')) return;

            try {
                const data = await api.post('/api/game/' + sessionId + '/abandon');
                addMessage('已放弃本局游戏', 'ai system');
                endGame(data.answer);
            } catch (e) {
                alert(e.message);
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = 'msg ' + className;
            div.textContent = text;
            document.getElementById('chatArea').appendChild(div);
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
        }

        function endGame(answer) {
            gameActive = false;
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('abandonBtn').style.display = 'none';
            const over = document.getElementById('gameOver');
            document.getElementById('gameOverTitle').textContent = '🎉 恭喜你猜对了！';
            document.getElementById('gameOverAnswer').textContent = '真相：' + answer;
            over.style.display = 'block';
        }
    </script>
</body>
</html>
