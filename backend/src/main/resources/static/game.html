<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海龟汤 - 推理中</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee;
            display: flex; flex-direction: column; height: 100vh;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; background: #16213e;
        }
        .header h2 { font-size: 17px; }
        .header .back-btn {
            background: none; border: none; color: #e94560; font-size: 15px; cursor: pointer;
        }
        .puzzle-bar {
            padding: 12px 16px; background: #0f3460; font-size: 14px;
            color: #f5a623; cursor: pointer;
        }
        .puzzle-detail { display: none; padding: 12px 16px; background: #0f3460; font-size: 14px; color: #ccc; line-height: 1.6; }
        .chat-area {
            flex: 1; overflow-y: auto; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.5; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { align-self: flex-end; background: #e94560; color: #fff; border-bottom-right-radius: 4px; }
        .msg.ai { align-self: flex-start; background: #16213e; border-bottom-left-radius: 4px; }
        .msg.ai.yes { border-left: 3px solid #4caf50; }
        .msg.ai.no { border-left: 3px solid #e94560; }
        .msg.ai.irrelevant { border-left: 3px solid #8892b0; }
        .typing { color: #8892b0; font-size: 14px; padding: 8px 16px; display: none; }
        .input-area {
            display: flex; padding: 12px 16px; gap: 8px;
            background: #16213e; border-top: 1px solid #2a3a5c;
        }
        .input-area input {
            flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #2a3a5c;
            background: #0f3460; color: #eee; font-size: 15px; outline: none;
        }
        .input-area input:focus { border-color: #e94560; }
        .input-area button {
            padding: 12px 20px; border-radius: 20px; border: none;
            font-size: 15px; font-weight: 600; cursor: pointer;
            background: #e94560; color: #fff; white-space: nowrap;
        }
        .input-area button:active { opacity: 0.85; }
        .input-area button.secondary { background: #0f3460; color: #ccc; }
        .game-over {
            display: none; text-align: center; padding: 20px;
            background: #16213e; margin: 12px 16px; border-radius: 12px;
        }
        .game-over h3 { margin-bottom: 12px; }
        .game-over .answer { color: #f5a623; font-size: 15px; line-height: 1.7; margin-bottom: 12px; }
        .game-over button {
            padding: 12px 24px; border-radius: 10px; border: none;
            background: #e94560; color: #fff; font-size: 15px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='/index.html'">← 返回</button>
        <h2 id="headerTitle">推理中...</h2>
        <button class="back-btn" onclick="abandonGame()" id="abandonBtn">放弃</button>
    </div>
    <div class="puzzle-bar" onclick="togglePuzzle()">📖 <span id="puzzleTitleBar">点击查看谜面</span></div>
    <div class="puzzle-detail" id="puzzleDetail"></div>
    <div class="chat-area" id="chatArea">
        <div class="msg ai" style="align-self:center;text-align:center;color:#8892b0;background:none;">
            向 AI 提问，推理出故事真相！<br>AI 只会回答："是"、"否" 或 "无关紧要"
        </div>
    </div>
    <div class="typing" id="typing">AI 思考中...</div>
    <div id="inputArea" class="input-area">
        <input type="text" id="questionInput" placeholder="输入你的问题..." onkeydown="if(event.key==='Enter')ask()">
        <button onclick="ask()">提问</button>
        <button class="secondary" onclick="showGuessInput()">我猜到了</button>
    </div>
    <div id="gameOver" class="game-over">
        <h3 id="gameOverTitle"></h3>
        <div class="answer" id="gameOverAnswer"></div>
        <button onclick="location.href='/index.html'">再来一题</button>
    </div>

    <script src="api.js"></script>
    <script>
        const params = new URLSearchParams(location.search);
        const sessionId = params.get('sessionId');
        let gameActive = true;

        (async function init() {
            if (!api.token) { location.href = '/login.html'; return; }
            if (!sessionId) { location.href = '/index.html'; return; }
            try {
                const logs = await api.get('/api/game/' + sessionId + '/chat');
                // Get puzzle info from the last response or a separate call
                const history = await api.get('/api/game/history');
                const session = history.find(s => s.sessionId == sessionId);
                if (session) {
                    document.getElementById('headerTitle').textContent = session.title || '推理中...';
                    document.getElementById('puzzleTitleBar').textContent = '点击查看谜面: ' + (session.title || '');
                }
            } catch (e) {
                console.error(e);
            }
        })();

        function togglePuzzle() {
            const el = document.getElementById('puzzleDetail');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        async function ask() {
            if (!gameActive) return;
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            addMessage(question, 'user');
            input.value = '';
            document.getElementById('typing').style.display = 'block';

            try {
                const data = await api.post('/api/game/' + sessionId + '/ask', { question });
                let replyClass = '';
                if (data.reply === '是') replyClass = 'yes';
                else if (data.reply === '否') replyClass = 'no';
                else replyClass = 'irrelevant';
                addMessage(data.reply, 'ai ' + replyClass);
            } catch (e) {
                addMessage('出错啦：' + e.message, 'ai');
            }
            document.getElementById('typing').style.display = 'none';
        }

        async function showGuessInput() {
            if (!gameActive) return;
            const guess = prompt('请输入你认为的真相：');
            if (!guess || !guess.trim()) return;

            addMessage('我猜真相是：' + guess, 'user');

            try {
                const data = await api.post('/api/game/' + sessionId + '/guess', { guess });
                if (data.correct) {
                    addMessage('猜对啦！恭喜！', 'ai yes');
                    endGame(true, data.answer);
                } else {
                    addMessage(data.message, 'ai no');
                }
            } catch (e) {
                addMessage('出错啦：' + e.message, 'ai');
            }
        }

        async function abandonGame() {
            if (!gameActive) return;
            if (!confirm('确定放弃吗？放弃后将显示答案。')) return;

            try {
                const data = await api.post('/api/game/' + sessionId + '/abandon');
                addMessage('已放弃本局游戏', 'ai');
                endGame(false, data.answer);
            } catch (e) {
                alert(e.message);
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = 'msg ' + className;
            div.textContent = text;
            document.getElementById('chatArea').appendChild(div);
            document.getElementById('chatArea').scrollTop = document.getElementById('chatArea').scrollHeight;
        }

        function endGame(won, answer) {
            gameActive = false;
            document.getElementById('inputArea').style.display = 'none';
            document.getElementById('abandonBtn').style.display = 'none';
            const over = document.getElementById('gameOver');
            document.getElementById('gameOverTitle').textContent = won ? '🎉 恭喜你猜对了！' : '游戏结束';
            document.getElementById('gameOverAnswer').textContent = '真相：' + answer;
            over.style.display = 'block';
        }
    </script>
</body>
</html>
