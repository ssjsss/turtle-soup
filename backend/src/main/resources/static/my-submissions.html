<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="manifest" href="/manifest.json">
        <title>海龟汤 - 我的投稿</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding-bottom: 60px; }
        .header { display: flex; align-items: center; padding: 16px 20px; background: #16213e; }
        .header h2 { font-size: 20px; margin-left: 12px; }
        .back-btn { background: none; border: none; color: #e94560; font-size: 18px; cursor: pointer; }
        .list { padding: 16px; }
        .card {
            background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 10px;
        }
        .card .title { font-size: 16px; margin-bottom: 8px; }
        .card .row { display: flex; justify-content: space-between; align-items: center; }
        .card .status-badge {
            font-size: 12px; padding: 3px 10px; border-radius: 20px;
        }
        .status-badge.APPROVED { background: #4caf50; color: #fff; }
        .status-badge.REJECTED { background: #e94560; color: #fff; }
        .status-badge.PENDING { background: #f5a623; color: #000; }
        .card .reason { font-size: 13px; color: #e94560; margin-top: 8px; }
        .card .meta { font-size: 12px; color: #8892b0; margin-top: 4px; }
        .empty { text-align: center; padding: 60px 20px; color: #8892b0; display: none; }
        .fab {
            position: fixed; bottom: 70px; right: 20px;
            width: 56px; height: 56px; border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #f5a623);
            color: #fff; font-size: 28px; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; border: none; box-shadow: 0 4px 12px rgba(233,69,96,0.4);
        }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #16213e; border-top: 1px solid #2a3a5c; }
        .nav-item { flex: 1; text-align: center; padding: 12px 0; color: #8892b0; cursor: pointer; font-size: 12px; text-decoration: none; }
        .nav-item .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .status-legend { display: flex; gap: 16px; padding: 12px 16px; font-size: 12px; color: #8892b0; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='/profile.html'">←</button>
        <h2>我的投稿</h2>
    </div>
    <div class="status-legend">
        <span>🟢 已通过</span><span>🔴 已拒绝</span>
    </div>
    <div class="list" id="list"></div>
    <div class="empty" id="empty" style="display:none">
        <div style="font-size:64px;margin-bottom:16px;">📝</div>
        <p>还没有投稿</p>
        <button style="margin-top:16px;padding:12px 24px;border-radius:8px;border:none;background:#e94560;color:#fff;cursor:pointer;" onclick="location.href='/upload.html'">去投稿</button>
    </div>
    <button class="fab" onclick="location.href='/upload.html'">+</button>

    <script src="api.js"></script>
    <script>
        if (!api.token) { location.href = '/login.html'; return; }

        (async function init() {
            try {
                const data = await api.get('/api/puzzle/my-submissions');
                if (!data || data.length === 0) {
                    document.getElementById('empty').style.display = 'block';
                    return;
                }
                const list = document.getElementById('list');
                data.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const statusText = item.status === 'APPROVED' ? '已通过' :
                                      item.status === 'REJECTED' ? '已拒绝' : '审核中';
                    card.innerHTML = `
                        <div class="title">${item.title}</div>
                        <div class="row">
                            <div class="meta">${item.author} | ${formatTime(item.createTime)}</div>
                            <span class="status-badge ${item.status}">${statusText}</span>
                        </div>
                        ${item.reviewReason ? '<div class="reason">' + item.reviewReason + '</div>' : ''}
                    `;
                    list.appendChild(card);
                });
            } catch (e) {
                document.getElementById('empty').style.display = 'block';
            }
        })();

        function formatTime(str) {
            return str ? new Date(str).toLocaleDateString('zh-CN') : '';
        }
    </script>
</body>
</html>
