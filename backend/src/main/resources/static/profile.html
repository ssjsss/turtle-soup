<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>海龟汤 - 个人中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e; color: #eee; min-height: 100vh;
            padding-bottom: 60px;
        }
        .header {
            display: flex; align-items: center; padding: 16px 20px;
            background: #16213e;
        }
        .header h2 { font-size: 20px; margin-left: 12px; }
        .back-btn {
            background: none; border: none; color: #e94560; font-size: 18px; cursor: pointer;
        }
        .profile-card {
            margin: 20px; padding: 24px;
            background: #16213e; border-radius: 16px; text-align: center;
        }
        .avatar {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, #e94560, #f5a623);
            display: flex; align-items: center; justify-content: center;
            font-size: 36px; margin: 0 auto 16px;
        }
        .profile-card .name { font-size: 20px; margin-bottom: 4px; }
        .profile-card .username { font-size: 14px; color: #8892b0; margin-bottom: 4px; }
        .profile-card .join-date { font-size: 13px; color: #555; }
        .section {
            margin: 0 20px 20px; padding: 16px;
            background: #16213e; border-radius: 14px;
        }
        .section h3 { font-size: 16px; margin-bottom: 12px; color: #f5a623; }
        .form-group { margin-bottom: 12px; }
        .form-group input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2a3a5c;
            background: #0f3460; color: #eee; font-size: 15px; outline: none;
        }
        .form-group input:focus { border-color: #e94560; }
        .save-btn {
            width: 100%; padding: 12px; border: none; border-radius: 8px;
            background: #e94560; color: #fff; font-size: 15px; cursor: pointer;
        }
        .logout-btn {
            display: block; width: calc(100% - 40px); margin: 0 20px 20px;
            padding: 14px; border: 1px solid #e94560; border-radius: 10px;
            background: transparent; color: #e94560; font-size: 16px; cursor: pointer;
            text-align: center;
        }
        .nav-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; background: #16213e; border-top: 1px solid #2a3a5c;
        }
        .nav-item {
            flex: 1; text-align: center; padding: 12px 0;
            color: #8892b0; cursor: pointer; font-size: 12px; text-decoration: none;
        }
        .nav-item.active { color: #e94560; }
        .nav-item .nav-icon { font-size: 22px; display: block; margin-bottom: 2px; }
        .msg { text-align: center; margin-top: 8px; font-size: 13px; display: none; }
        .msg.success { color: #4caf50; }
        .msg.error { color: #e94560; }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="location.href='/index.html'">←</button>
        <h2>个人中心</h2>
    </div>
    <div class="profile-card">
        <div class="avatar" id="avatarText">🐢</div>
        <div class="name" id="profileName"></div>
        <div class="username" id="profileUsername"></div>
        <div class="join-date" id="profileDate"></div>
    </div>
    <div class="section">
        <h3>修改昵称</h3>
        <div class="form-group">
            <input type="text" id="nicknameInput" placeholder="输入新昵称">
        </div>
        <button class="save-btn" onclick="updateNickname()">保存</button>
        <p class="msg" id="updateMsg"></p>
    </div>
    <button class="logout-btn" onclick="logout()">退出登录</button>
    <div class="nav-bar">
        <a class="nav-item" href="/index.html"><span class="nav-icon">🏠</span>首页</a>
        <a class="nav-item" href="/history.html"><span class="nav-icon">📋</span>历史</a>
        <a class="nav-item" href="/leaderboard.html"><span class="nav-icon">🏆</span>排行</a>
        <a class="nav-item active" href="/profile.html"><span class="nav-icon">👤</span>我的</a>
    </div>

    <script src="api.js"></script>
    <script>
        (async function init() {
            if (!api.token) { location.href = '/login.html'; return; }
            try {
                const profile = await api.get('/api/user/profile');
                document.getElementById('profileName').textContent = profile.nickname || profile.username;
                document.getElementById('profileUsername').textContent = '@' + profile.username;
                document.getElementById('profileDate').textContent = '加入于 ' + new Date(profile.createTime).toLocaleDateString('zh-CN');
                document.getElementById('nicknameInput').value = profile.nickname || '';
                document.getElementById('avatarText').textContent = (profile.nickname || profile.username).charAt(0);
            } catch (e) {
                location.href = '/login.html';
            }
        })();

        async function updateNickname() {
            const nickname = document.getElementById('nicknameInput').value.trim();
            if (!nickname) return;
            const msg = document.getElementById('updateMsg');
            try {
                await api.put('/api/user/profile', { nickname });
                msg.className = 'msg success';
                msg.textContent = '昵称已更新';
                msg.style.display = 'block';
                document.getElementById('profileName').textContent = nickname;
                document.getElementById('avatarText').textContent = nickname.charAt(0);
            } catch (e) {
                msg.className = 'msg error';
                msg.textContent = e.message;
                msg.style.display = 'block';
            }
        }

        function logout() {
            if (confirm('确定退出登录吗？')) {
                api.clearToken();
                location.href = '/login.html';
            }
        }
    </script>
</body>
</html>
